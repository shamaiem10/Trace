<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TrustCheck demo</title><style>body{font:16px system-ui;max-width:720px;margin:3rem auto;padding:0 1rem}input{width:5rem;margin:.25rem}button{padding:.5rem 1rem}pre{white-space:pre-wrap;background:#f5f5f5;padding:1rem;border-radius:.5rem}.note{color:#7a1f1f}</style></head>
<body><h1>TrustCheck</h1><p class="note">Research prototype — this is a risk pattern flag, not a diagnosis or medical advice.</p><form id="form"><label>Age <input name="age" type="number" value="32" min="18" max="49"></label><label>BMI <input name="bmi" type="number" step=".1" value="28"></label><label>Irregular (0/1) <input name="menstrual_irregularity" type="number" value="1" min="0" max="1"></label><label>Pain (0–10) <input name="chronic_pain_level" type="number" step=".1" value="7" min="0" max="10"></label><label>Hormone abnormality (0/1) <input name="hormone_level_abnormality" type="number" value="0" min="0" max="1"></label><label>Infertility (0/1) <input name="infertility" type="number" value="0" min="0" max="1"></label><p><button>Assess pattern</button></p></form><pre id="result">Start the API at http://127.0.0.1:8000, then submit this form.</pre><script>document.querySelector('#form').onsubmit=async e=>{e.preventDefault();const f=new FormData(e.target),body=Object.fromEntries(f);for(const k in body)body[k]=Number(body[k]);const out=document.querySelector('#result');try{const r=await fetch('http://127.0.0.1:8000/v1/assess',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});out.textContent=JSON.stringify(await r.json(),null,2)}catch(err){out.textContent='API unavailable: '+err.message}};</script></body></html>
